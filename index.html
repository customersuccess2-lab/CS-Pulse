<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Hub PLIQ — Customer Success 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1c2333;--bg4:#222a3e;--bg5:#283047;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --text:#dde3f0;--muted:#7a8599;--subtle:#4a5568;
  --accent:#3b82f6;--accent-h:#2563eb;
  --green:#10b981;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--teal:#06b6d4;
  --fn:'Inter',system-ui,sans-serif;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--fn);font-size:14px;display:flex;height:100vh;overflow:hidden}
a{color:var(--accent);text-decoration:none}

/* SIDEBAR */
#sidebar{width:230px;min-width:230px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden;transition:width .2s}
.logo-wrap{padding:18px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.logo-text{font-size:15px;font-weight:600;letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--muted);margin-top:1px}
.nav-section{padding:14px 10px 4px;font-size:10px;font-weight:600;color:var(--subtle);text-transform:uppercase;letter-spacing:1.2px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;margin:1px 6px;border-radius:var(--r);cursor:pointer;color:var(--muted);font-size:13px;font-weight:400;transition:all .15s;background:none;border:none;width:calc(100% - 12px);text-align:left;font-family:var(--fn)}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(59,130,246,0.12);color:var(--accent);font-weight:500}
.nav-item svg{flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center}
.sidebar-footer{margin-top:auto;padding:10px 6px;border-top:1px solid var(--border)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);height:52px;padding:0 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-title{font-size:14px;font-weight:600;flex:1}
.pill{background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:20px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.pill.ok{border-color:rgba(16,185,129,.3);color:var(--green)}
.pill.warn{border-color:rgba(245,158,11,.3);color:var(--amber)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* BUTTONS */
.btn{padding:6px 14px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:var(--fn);display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-h)}
.btn-ghost{background:var(--bg3);border:1px solid var(--border2);color:var(--text)}
.btn-ghost:hover{background:var(--bg4)}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red)}
.btn-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:var(--green)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px 24px;min-width:0}
.view{display:none;animation:fadeIn .2s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:600;color:var(--text)}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}

/* METRIC */
.metric{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.metric-lbl{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.metric-val{font-size:24px;font-weight:600;line-height:1;letter-spacing:-.5px}
.metric-sub{font-size:11px;margin-top:5px;color:var(--muted)}
.metric-sub.up{color:var(--green)}
.metric-sub.down{color:var(--red)}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-green{background:rgba(16,185,129,.12);color:#10b981}
.b-red{background:rgba(239,68,68,.12);color:#ef4444}
.b-amber{background:rgba(245,158,11,.12);color:#f59e0b}
.b-blue{background:rgba(59,130,246,.12);color:#3b82f6}
.b-purple{background:rgba(139,92,246,.12);color:#8b5cf6}
.b-teal{background:rgba(6,182,212,.12);color:#06b6d4}
.b-gray{background:rgba(122,133,153,.12);color:#7a8599}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{padding:8px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border:none}
.tbl tr:hover td{background:rgba(255,255,255,0.015)}
.tbl-wrap{overflow-x:auto;border-radius:var(--rl);border:1px solid var(--border)}

/* FORM */
.frow{margin-bottom:12px}
.flabel{font-size:11px;font-weight:500;color:var(--muted);display:block;margin-bottom:5px}
.finput{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--fn);font-size:13px;padding:7px 10px;border-radius:var(--r);outline:none;width:100%;transition:
